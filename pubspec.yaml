name: swift_keep
description: "SwiftKeep - Personal inventory & asset manager. Quick add, search, offline-first."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Local database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0
  # Barcode & camera
  mobile_scanner: 5.2.3
  image_picker: ^1.0.7
  # camera: ^0.11.0  # Tạm bỏ: camera_android_camerax 0.6.8 lỗi build với Flutter mới (SurfaceProducer.Callback). Dùng image_picker chụp ảnh. Khi nâng Flutter 3.41+ (Dart 3.9+) có thể dùng camera: ^0.12.0 để có preview trong app.
  # Utils
  uuid: ^4.3.3
  image: ^4.3.0
  intl: ^0.19.0
  # Export
  excel: ^4.0.6
  share_plus: ^10.0.2
  # Networking
  http: ^1.2.2
  shared_preferences: ^2.2.2
  # UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  drift_dev: ^2.16.0
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
